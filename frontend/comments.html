<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments - Muhammad Ahmad</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav">
                <button onclick="location.href='index.html'">Home</button>
                <button onclick="location.href='about.html'">About</button>
                <h3><span>A</span>HM<span>A</span>D</h3>
                <button onclick="location.href='projects.html'">Projects</button>
                <button onclick="location.href='comments.html'" style="color:white">Comments</button>
                <button onclick="location.href='contact.html'">Contact</button>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="page-header">
            <h1>Comments & Feedback</h1>
            <p>Share your thoughts, feedback, or just say hello!</p>
        </div>
        <div class="breadcrumb">
            <a href="index.html">Home</a> &nbsp;/&nbsp; Comments
        </div>

        <section class="comments-section">
            <div class="comment-form-card scroll-reveal">
                <h2>Leave a Comment</h2>
                <div class="alert success" id="alertSuccess">
                    <i class="fas fa-check-circle"></i> Your comment was posted successfully!
                </div>
                <div class="alert error" id="alertError">
                    <i class="fas fa-exclamation-circle"></i> <span id="errorText">Something went wrong. Please try again.</span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" id="commentName" placeholder="Your name" />
                    </div>
                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text" id="commentCompany" placeholder="Your company (optional)" />
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" id="commentEmail" placeholder="you@example.com" />
                </div>
                <div class="form-group">
                    <label>Comment *</label>
                    <textarea id="commentMessage" placeholder="Write your comment or feedback..."></textarea>
                </div>

                <button class="btn-submit" id="submitCommentBtn" onclick="submitComment()">
                    <i class="fas fa-paper-plane"></i> Post Comment
                </button>
            </div>

            <div class="comments-list" id="commentsList">
                <div class="loading-spinner">
                    <i class="fas fa-spinner"></i> Loading comments...
                </div>
            </div>
        </section>
    </main>

    <script>
        const API_BASE = 'https://YOUR-APP-NAME.onrender.com/api';

        let allComments = [];

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        function getInitials(name) {
            return (name || '?').trim().split(/\s+/).map(p => p[0]).slice(0, 2).join('').toUpperCase();
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            if (isNaN(d)) return '';
            return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        }

        async function loadComments() {
            const list = document.getElementById('commentsList');
            try {
                const res = await fetch(`${API_BASE}/comments`);
                if (!res.ok) throw new Error('API not available');
                allComments = await res.json();
            } catch {
                allComments = [];
                list.innerHTML = `
                    <div class="comments-empty">
                        <i class="fas fa-comments"></i>
                        Comments are currently unavailable. Please make sure the backend server is running.
                    </div>`;
                return;
            }
            renderComments();
        }

        function renderComments() {
            const list = document.getElementById('commentsList');

            if (!allComments.length) {
                list.innerHTML = `
                    <div class="comments-empty">
                        <i class="fas fa-comments"></i>
                        No comments yet. Be the first to share your thoughts!
                    </div>`;
                return;
            }

            list.innerHTML = allComments.map(c => renderComment(c)).join('');
        }

        function renderComment(comment, isReply = false) {
            const replies = (comment.replies || []).map(r => renderComment(r, true)).join('');
            return `
                <div class="comment-card" data-id="${comment.id}">
                    <div class="comment-header">
                        <div class="comment-author">
                            <div class="comment-avatar">${escapeHtml(getInitials(comment.name))}</div>
                            <div class="comment-author-info">
                                <h4>${escapeHtml(comment.name)}${comment.company ? ` <span>• ${escapeHtml(comment.company)}</span>` : ''}</h4>
                                <span>${escapeHtml(comment.email)}</span>
                            </div>
                        </div>
                        <div class="comment-date">${formatDate(comment.created_at)}</div>
                    </div>
                    <p class="comment-message">${escapeHtml(comment.message)}</p>
                    <div class="comment-actions">
                        <button class="comment-action-btn" onclick="likeComment(${comment.id}, this)">
                            <i class="far fa-thumbs-up"></i> <span>${comment.likes || 0}</span>
                        </button>
                        ${!isReply ? `
                        <button class="comment-action-btn" onclick="toggleReplyForm(${comment.id})">
                            <i class="fas fa-reply"></i> Reply
                        </button>` : ''}
                    </div>
                    ${!isReply ? `
                    <div class="reply-form" id="reply-form-${comment.id}">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Name *</label>
                                <input type="text" id="replyName-${comment.id}" placeholder="Your name" />
                            </div>
                            <div class="form-group">
                                <label>Company Name</label>
                                <input type="text" id="replyCompany-${comment.id}" placeholder="Your company (optional)" />
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email Address *</label>
                            <input type="email" id="replyEmail-${comment.id}" placeholder="you@example.com" />
                        </div>
                        <div class="form-group">
                            <label>Reply *</label>
                            <textarea id="replyMessage-${comment.id}" placeholder="Write your reply..."></textarea>
                        </div>
                        <button class="btn-submit" onclick="submitReply(${comment.id})">
                            <i class="fas fa-reply"></i> Post Reply
                        </button>
                    </div>` : ''}
                    ${replies ? `<div class="comment-replies">${replies}</div>` : ''}
                </div>
            `;
        }

        function toggleReplyForm(id) {
            const form = document.getElementById(`reply-form-${id}`);
            form.classList.toggle('active');
        }

        function showError(msg) {
            const errorAlert = document.getElementById('alertError');
            document.getElementById('errorText').textContent = msg;
            errorAlert.style.display = 'block';
            document.getElementById('alertSuccess').style.display = 'none';
            setTimeout(() => errorAlert.style.display = 'none', 4000);
        }

        function showSuccess() {
            const successAlert = document.getElementById('alertSuccess');
            successAlert.style.display = 'block';
            document.getElementById('alertError').style.display = 'none';
            setTimeout(() => successAlert.style.display = 'none', 4000);
        }

        async function submitComment() {
            const name = document.getElementById('commentName').value.trim();
            const company = document.getElementById('commentCompany').value.trim();
            const email = document.getElementById('commentEmail').value.trim();
            const message = document.getElementById('commentMessage').value.trim();

            if (!name || !email || !message) {
                showError('Please fill in your name, email, and comment.');
                return;
            }

            const btn = document.getElementById('submitCommentBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Posting...';

            try {
                const res = await fetch(`${API_BASE}/comments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, company, email, message })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Server error');

                allComments.unshift(data.comment);
                renderComments();
                showSuccess();

                document.getElementById('commentName').value = '';
                document.getElementById('commentCompany').value = '';
                document.getElementById('commentEmail').value = '';
                document.getElementById('commentMessage').value = '';
            } catch (err) {
                showError(err.message || 'Could not post your comment. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Post Comment';
            }
        }

        async function submitReply(parentId) {
            const name = document.getElementById(`replyName-${parentId}`).value.trim();
            const company = document.getElementById(`replyCompany-${parentId}`).value.trim();
            const email = document.getElementById(`replyEmail-${parentId}`).value.trim();
            const message = document.getElementById(`replyMessage-${parentId}`).value.trim();

            if (!name || !email || !message) {
                showError('Please fill in your name, email, and reply.');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/comments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, company, email, message, parent_id: parentId })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Server error');

                const parent = allComments.find(c => c.id === parentId);
                if (parent) {
                    parent.replies = parent.replies || [];
                    parent.replies.push(data.comment);
                }
                renderComments();
                showSuccess();
            } catch (err) {
                showError(err.message || 'Could not post your reply. Please try again.');
            }
        }

        async function likeComment(id, btn) {
            if (btn.classList.contains('liked')) return;
            btn.classList.add('liked');
            btn.querySelector('i').className = 'fas fa-thumbs-up';

            const span = btn.querySelector('span');
            span.textContent = (parseInt(span.textContent, 10) || 0) + 1;

            try {
                const res = await fetch(`${API_BASE}/comments/${id}/like`, { method: 'POST' });
                const data = await res.json();
                if (res.ok) span.textContent = data.likes;
            } catch {
                // optimistic update remains
            }
        }

        loadComments();
    </script>
    <script src="scroll-reveal.js"></script>
</body>
</html>
