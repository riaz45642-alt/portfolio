<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Muhammad Ahmad</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav">
                <button onclick="location.href='index.html'">Home</button>
                <button onclick="location.href='about.html'">About</button>
                <h3><span>A</span>HM<span>A</span>D</h3>
                <button onclick="location.href='projects.html'" style="color:white">Projects</button>
                <button onclick="location.href='comments.html'">Comments</button>
                <button onclick="location.href='contact.html'">Contact</button>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="page-header">
            <h1>My Projects</h1>
            <p>A showcase of my work, experiments, and passion projects</p>
        </div>
        <div class="breadcrumb">
            <a href="index.html">Home</a> &nbsp;/&nbsp; Projects
        </div>

        <div class="projects-filter">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="frontend">Frontend</button>
            <button class="filter-btn" data-filter="fullstack">Full Stack</button>
        </div>

        <div class="projects-grid scroll-reveal" id="projectsGrid">
            <div class="loading-spinner">
                <i class="fas fa-spinner"></i>
                Loading projects...
            </div>
        </div>
    </main>

    <script src="scroll-reveal.js"></script>
    <script>
        const API_BASE = 'https://YOUR-APP-NAME.onrender.com/api';

        const fallbackProjects = [
            {
                id: 1,
                title: "Job Portal & Combined CV Generator",
                description: "A fully responsive job portal built with Node.js, TiDB Cloud, Firebase Authentication, and Cloudflare Pages — featuring Job Seeker and Employer dashboards with an integrated CV generator.",
                tags: ["HTML", "CSS", "JavaScript", "Node.js", "Firebase"],
                category: "fullstack",
                featured: true,
                icon: "fas fa-briefcase",
                github: "https://github.com/riaz45642-alt",
                demo: "https://talentbridge-2o9.pages.dev",
                images: [
                    "assets/landingpage.png",
                    "assets/jobseekerpage.png",
                    "assets/employerpage.png",
                    "assets/cvgeneratorpage.png"
                ]
            }
        ];

        let allProjects   = [];
        let currentFilter = 'all';
        let sliderIntervals = [];

        function clearSliders() {
            sliderIntervals.forEach(clearInterval);
            sliderIntervals = [];
        }

        async function loadProjects() {
            try {
                const res = await fetch(`${API_BASE}/projects`);
                if (!res.ok) throw new Error('API not available');
                allProjects = await res.json();
            } catch {
                allProjects = fallbackProjects;
            }
            renderProjects(allProjects);
        }

        function initSlider(card) {
            const slides  = card.querySelectorAll('.project-slide');
            const dots    = card.querySelectorAll('.project-slider-dot');
            const slider  = card.querySelector('.project-slider');
            const firstImg = slides[0];
            let current   = 0;

            function setupSlides() {
                // Container ki height pehli image ki natural height se set karo
                const h = firstImg.offsetHeight;
                slider.style.height = h + 'px';

                // Sab slides absolute, full width/height
                slides.forEach((s, idx) => {
                    s.style.cssText = `
                        position: absolute;
                        top: 0; left: 0;
                        width: 100%; height: 100%;
                        object-fit: cover;
                        opacity: ${idx === 0 ? '1' : '0'};
                        transition: opacity 0.8s ease;
                    `;
                });
            }

            // Image already loaded ho ya load hone ka wait karo
            if (firstImg.complete && firstImg.naturalHeight > 0) {
                setupSlides();
            } else {
                firstImg.addEventListener('load', setupSlides);
            }

            // Auto rotate
            const interval = setInterval(() => {
                slides[current].style.opacity = '0';
                dots[current]?.classList.remove('active');

                current = (current + 1) % slides.length;

                slides[current].style.opacity = '1';
                dots[current]?.classList.add('active');
            }, 3500);

            sliderIntervals.push(interval);
        }

        function renderProjects(projects) {
            const grid = document.getElementById('projectsGrid');
            const filtered = currentFilter === 'all'
                ? projects
                : projects.filter(p => p.category === currentFilter);

            clearSliders();

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="loading-spinner" style="color:var(--text-light-grey)">
                        <i class="fas fa-folder-open" style="color:var(--accent-color);animation:none"></i>
                        No projects in this category yet.
                    </div>`;
                return;
            }

            grid.innerHTML = '';

            filtered.forEach((project, i) => {
                const images = (project.images && project.images.length) ? project.images : null;
                const card   = document.createElement('div');
                card.className = 'project-card';
                card.style.animationDelay = `${i * 0.12}s`;
                card.dataset.category = project.category;

                // ---- THUMB CONTENT ----
                let thumbInner = '';

                if (images) {
                    // FEATURED badge
                    const badge = project.featured
                        ? `<span style="
                                position:absolute;top:14px;right:14px;z-index:10;
                                background:var(--accent-color);color:#fff;
                                font-family:'Poppins',sans-serif;font-size:0.7em;
                                font-weight:700;letter-spacing:1.5px;
                                text-transform:uppercase;padding:5px 14px;
                                border-radius:20px;
                                box-shadow:0 2px 12px rgba(140,82,255,0.6);">FEATURED</span>`
                        : '';

                    // Slides — pehli image normal flow mein (height ke liye), baaki hidden
                    const slidesHTML = images.map((src, idx) =>
                        `<img
                            src="${src}"
                            class="project-slide${idx === 0 ? ' active' : ''}"
                            alt="${project.title} screenshot ${idx + 1}"
                            loading="lazy"
                            style="display:block;width:100%;height:auto;object-fit:cover;
                                   ${idx !== 0 ? 'position:absolute;top:0;left:0;height:100%;opacity:0;transition:opacity 0.8s ease;' : 'opacity:1;'}"
                        />`
                    ).join('');

                    // Dots
                    const dotsHTML = images.length > 1
                        ? `<div class="project-slider-dots">
                            ${images.map((_, idx) =>
                                `<span class="project-slider-dot${idx === 0 ? ' active' : ''}"></span>`
                            ).join('')}
                           </div>`
                        : '';

                    thumbInner = `
                        ${badge}
                        <div class="project-slider" style="position:relative;width:100%;line-height:0;display:block;">
                            ${slidesHTML}
                        </div>
                        ${dotsHTML}
                    `;
                } else {
                    // Icon fallback
                    thumbInner = `
                        <div style="display:flex;align-items:center;justify-content:center;
                                    height:220px;font-size:3.5em;color:var(--accent-color);">
                            <i class="${project.icon || 'fas fa-code'}"></i>
                        </div>`;
                }

                card.innerHTML = `
                    <div class="project-thumb" style="
                        width:100%;height:auto;position:relative;
                        overflow:hidden;display:block;
                        background:linear-gradient(135deg,#1a242b,#20303a);">
                        ${thumbInner}
                    </div>
                    <div class="project-body">
                        <h3>${project.title}</h3>
                        <p>${project.description}</p>
                        <div class="project-tags">
                            ${(project.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
                        </div>
                        <div class="project-links">
                            <a href="${project.github || '#'}" class="btn-link primary" target="_blank">
                                <i class="fab fa-github"></i> GitHub
                            </a>
                            <a href="${project.demo || '#'}" class="btn-link secondary" target="_blank">
                                <i class="fas fa-external-link-alt"></i> Live Demo
                            </a>
                        </div>
                    </div>
                `;

                grid.appendChild(card);

                // Slider initialize karo (sirf tab jab multiple images ho)
                if (images && images.length > 1) {
                    initSlider(card);
                }
            });
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderProjects(allProjects);
            });
        });

        loadProjects();
    </script>
</body>
</html>
